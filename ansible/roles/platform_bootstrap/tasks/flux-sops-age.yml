---
- name: Vérifier que la clé age existe
  ansible.builtin.stat:
    path: "{{ sops_age_key_file }}"
  register: sops_age_key_stat

- name: Échouer si la clé age est introuvable
  ansible.builtin.fail:
    msg: "sops_age_key_file={{ sops_age_key_file }} introuvable"
  when: not sops_age_key_stat.stat.exists

- name: Créer le namespace flux-system
  ansible.builtin.shell: |
    set -o pipefail
    kubectl create namespace {{ flux_namespace }} --dry-run=client -o yaml | kubectl apply -f -
  register: flux_ns_apply
  changed_when: "'unchanged' not in flux_ns_apply.stdout"

- name: Créer le Secret sops-age
  ansible.builtin.shell: |
    set -o pipefail
    kubectl create secret generic sops-age \
      --namespace {{ flux_namespace }} \
      --from-file=age.agekey={{ sops_age_key_file }} \
      --dry-run=client -o yaml | kubectl apply -f -
  register: sops_age_secret_apply
  changed_when: "'unchanged' not in sops_age_secret_apply.stdout"
