# Unique objet appliqué à la main (kubectl, une fois -- cf. `make argocd-bootstrap`) :
# ArgoCD ne peut pas se "bootstrapper" lui-même depuis rien. Une fois synchronisé,
# ce root Application ("app of apps") fait d'ArgoCD la source de vérité continue
# pour tout argocd/managed/ dans le depot GitOps -- GitLab, le registry, l'exposition HTTP d'ArgoCD
# et les ApplicationSets applicatifs ajoutés dynamiquement. Les add-ons cluster
# bas niveau (Gateway API, MetalLB, Traefik, Gateway partagée) sont provisionnés
# par Ansible avant ArgoCD.
#
# Templatise (rendu par argocd-bootstrap.yml via ansible.builtin.template) :
# repoURL vient de la variable gitops_repo_url, pas d'une valeur figee ici --
# ce depot ne doit pas dependre du contenu de platform-gitops, seulement de sa
# configuration (cf. cockpit/docs/repo-map.md, diagramme de dependances).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # Depot source GitOps. GitLab interne est alimente/importé ensuite pour les
    # depots runtime de la plateforme (voir cockpit/docs/source-control.md).
    repoURL: {{ gitops_repo_url }}
    targetRevision: main
    path: argocd/managed
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
